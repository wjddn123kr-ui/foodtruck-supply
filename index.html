<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행사 공급처 찾기</title>
<style>
  :root{
    --bg:#F4F6F8; --surface:#fff; --ink:#191D26; --muted:#6B7480; --line:#E6E9EE;
    --ice:#1488B8; --ice-tint:#E9F5FB; --ice-deep:#0E6A92;
    --gas:#E5571A; --gas-tint:#FCEEE6; --gas-deep:#B5440F;
    --gold:#E9A60B; --gold-tint:#FBF3DD;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;}
  .wrap{max-width:480px; margin:0 auto; min-height:100vh; padding:0 16px 48px}
  header{padding:22px 2px 10px}
  .tag{font-size:11px; font-weight:700; background:var(--ink); color:#fff; padding:3px 8px; border-radius:999px}
  .live{font-size:11px; font-weight:700; color:#0E8A4F; background:#E6F6EE; border:1px solid #B6E6CC; padding:3px 8px; border-radius:999px; margin-left:6px}
  h1{font-size:25px; font-weight:800; margin:12px 0 4px}
  .sub{font-size:13.5px; color:var(--muted); margin:0; line-height:1.5}
  .errbar{display:none; background:#FDECEC; border:1px solid #F3B5B5; color:#B42318; font-size:12.5px; font-weight:600; padding:10px 12px; border-radius:10px; margin:12px 0; white-space:pre-wrap}
  .search{display:flex; gap:8px; margin:16px 0 8px}
  .field{flex:1; display:flex; align-items:center; gap:8px; background:#fff; border:1.5px solid var(--line); border-radius:14px; padding:0 14px}
  .field:focus-within{border-color:var(--ink)}
  .field input{flex:1; border:0; outline:0; background:transparent; font-size:16px; font-weight:600; padding:14px 0; color:var(--ink); font-family:inherit}
  .field input::placeholder{color:#A6AEB8; font-weight:500}
  #searchBtn{border:0; background:var(--ink); color:#fff; font-size:15px; font-weight:700; padding:0 18px; border-radius:14px; cursor:pointer; font-family:inherit}
  .hint{font-size:12.5px; color:var(--muted); margin:0 2px 14px}
  .hint b{color:var(--ink); font-weight:700; cursor:pointer; border-bottom:1.5px solid var(--line)}
  .here{width:100%; border:1.5px solid var(--ice); background:var(--ice-tint); color:var(--ice-deep); font-size:14px; font-weight:700; padding:12px 0; border-radius:12px; cursor:pointer; font-family:inherit; margin:0 0 14px}
  .here:active{transform:scale(.99)}
  .chooser{background:#fff; border:1px solid var(--line); border-radius:16px; padding:16px; margin-top:18px}
  .chooser-t{font-size:14px; font-weight:800; margin-bottom:12px}
  .choice{display:block; width:100%; text-align:left; border:1.5px solid var(--line); background:#fff; color:var(--ink); font-size:14.5px; font-weight:600; padding:13px 14px; border-radius:11px; cursor:pointer; font-family:inherit; margin-bottom:8px}
  .choice:active{transform:scale(.99)}
  .mapbtn{width:100%; border:1.5px solid var(--line); background:#fff; color:var(--ink); font-size:14px; font-weight:700; padding:11px 0; border-radius:12px; cursor:pointer; font-family:inherit; margin:0 0 12px}
  #mapwrap{display:none; margin:0 0 14px}
  #map{width:100%; height:300px; border-radius:14px; overflow:hidden; border:1px solid var(--line)}
  .legend{display:flex; align-items:center; font-size:12px; font-weight:600; color:var(--muted); margin:0 2px 8px}
  .legend .lg{width:11px; height:11px; border-radius:50%; display:inline-block; margin:0 5px 0 12px}
  .legend .lg:first-child{margin-left:0}
  .lg-ice{background:var(--ice)} .lg-gas{background:var(--gas)} .lg-c{background:#191D26}
  .lg-mart{background:#1F9D55}
  .pin{width:15px; height:15px; border-radius:50%; border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.35); cursor:pointer}
  .pin-ice{background:var(--ice)} .pin-gas{background:var(--gas)}
  .pin-mart{background:#1F9D55}
  .pin-center{width:16px; height:16px; background:#191D26; box-shadow:0 0 0 4px rgba(25,29,38,.2),0 1px 4px rgba(0,0,0,.35)}
  .radius{display:flex; gap:7px; margin:0 2px 6px}
  .chip{flex:1; text-align:center; border:1.5px solid var(--line); background:#fff; color:var(--muted); font-size:13px; font-weight:700; padding:10px 0; border-radius:11px; cursor:pointer; font-family:inherit}
  .chip.on{background:var(--ink); color:#fff; border-color:var(--ink)}
  .meta-line{font-size:12.5px;color:#8A929C;margin:6px 2px 0;font-weight:600}
  .section{margin-top:18px}
  .sec-head{display:flex; align-items:center; gap:9px; margin:0 2px 12px}
  .sec-bar{width:4px; height:18px; border-radius:99px}
  .sec-title{font-size:16px; font-weight:800}
  .sec-count{font-size:12px; font-weight:700; color:var(--muted); margin-left:auto}
  .ice .sec-bar{background:var(--ice)} .ice .sec-title{color:var(--ice-deep)}
  .gas .sec-bar{background:var(--gas)} .gas .sec-title{color:var(--gas-deep)}
  .mart .sec-bar{background:#1F9D55} .mart .sec-title{color:#147A40}
  .fav .sec-bar{background:var(--gold)} .fav .sec-title{color:#9A6E04}
  .card{background:#fff; border:1px solid var(--line); border-radius:16px; padding:15px 15px 13px; margin-bottom:10px}
  .card.is-fav{border-color:var(--gold); box-shadow:0 0 0 1px var(--gold)}
  .card-top{display:flex; align-items:flex-start; gap:10px}
  .name{font-size:16.5px; font-weight:800; line-height:1.25}
  .star{flex:none; margin-left:auto; width:34px; height:34px; border-radius:10px; border:1px solid var(--line); background:#fff; cursor:pointer; font-size:17px; line-height:1}
  .star.on{background:var(--gold-tint); border-color:var(--gold)}
  .meta{display:flex; align-items:center; gap:7px; margin-top:5px; flex-wrap:wrap}
  .dist{font-size:12.5px; font-weight:800; padding:2px 8px; border-radius:8px}
  .ice .dist{background:var(--ice-tint); color:var(--ice-deep)}
  .gas .dist{background:var(--gas-tint); color:var(--gas-deep)}
  .mart .dist{background:#E7F6EE; color:#147A40}
  .dist.manual{background:var(--gold-tint); color:#9A6E04}
  .cat{font-size:11.5px; font-weight:700; color:#5A6270; background:#F1F3F5; padding:2px 7px; border-radius:7px}
  .addr{font-size:13px; color:var(--muted)}
  .lastorder{margin-top:10px; font-size:12.5px; font-weight:600; color:#5A6270; background:#F6F8FA; border:1px solid var(--line); border-radius:10px; padding:8px 10px}
  .lastorder b{color:var(--ink); font-weight:800}
  .actions{display:flex; gap:8px; margin-top:12px}
  .btn{flex:1; border:0; border-radius:11px; padding:11px 0; cursor:pointer; font-size:14px; font-weight:700; font-family:inherit; text-decoration:none; text-align:center; color:#fff}
  .ice .btn-call{background:var(--ice)} .gas .btn-call{background:var(--gas)}
  .mart .btn-call{background:#1F9D55}
  .fav .btn-call{background:#7A828C}
  .btn-nocall{background:#C7CDD5}
  .btn-log{background:#EEF1F4; color:var(--ink)}
  .order,.addform{margin-top:11px; padding-top:13px; border-top:1px dashed var(--line); display:none}
  .order.open,.addform.open{display:block}
  .lab{display:block; font-size:11.5px; font-weight:700; color:var(--muted); margin:0 0 5px 2px}
  .order input,.addform input{width:100%; border:1.5px solid var(--line); border-radius:10px; padding:10px 11px; font-size:15px; font-weight:600; outline:0; font-family:inherit; margin-bottom:8px}
  .savebtn{width:100%; border:0; border-radius:11px; padding:12px 0; cursor:pointer; background:var(--ink); color:#fff; font-size:14.5px; font-weight:800; font-family:inherit}
  .addnew{width:100%; border:1.5px dashed #C7CDD5; background:transparent; color:#7A828C; font-size:13.5px; font-weight:700; padding:12px 0; border-radius:12px; cursor:pointer; font-family:inherit; margin-top:2px}
  .addform{border:1.5px solid var(--line); border-radius:14px; padding:14px; margin-top:8px}
  .beyond{font-size:12px; font-weight:600; color:var(--muted); text-align:center; padding:6px 0 8px}
  .empty{text-align:center; padding:40px 20px; color:var(--muted); font-size:14px; line-height:1.6}
  .empty .big{font-size:30px; margin-bottom:8px}
  footer{margin-top:30px; text-align:center; font-size:11.5px; color:#A6AEB8; line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="tag">푸드트럭하우스</span><span class="live">● 실시간 검색</span>
    <h1>행사 공급처 찾기</h1>
    <p class="sub">행사장 <b>읍·면·동</b>을 입력하면, 카카오맵에서 가까운 순으로 얼음·가스 업체를 찾아줘요.</p>
  </header>
  <div class="errbar" id="errbar"></div>
  <div class="search">
    <div class="field"><input id="region" type="text" placeholder="읍·면·동 입력 (예: 구갈동)" autocomplete="off"></div>
    <button id="searchBtn">찾기</button>
  </div>
  <button id="hereBtn" class="here">📍 현재 위치로 찾기</button>
  <p class="hint">예시: <b data-r="구갈동">구갈동</b> · <b data-r="정자동">정자동</b> · <b data-r="서교동">서교동</b></p>
  <div class="radius" id="radius">
    <button class="chip" data-km="5">5km</button>
    <button class="chip on" data-km="10">10km</button>
    <button class="chip" data-km="15">15km</button>
    <button class="chip" data-km="999">전체</button>
  </div>
  <button id="mapBtn" class="mapbtn" style="display:none">🗺 지도로 보기</button>
  <div id="mapwrap"><div class="legend"><span class="lg lg-c"></span>검색위치<span class="lg lg-ice"></span>얼음<span class="lg lg-gas"></span>가스<span class="lg lg-mart"></span>식자재</div><div id="map"></div></div>
  <div id="results"></div>
  <footer>카카오맵 실시간 검색 · 지도에 없는 업체는 "직접 추가"로 채울 수 있어요</footer>
</div>

<script>
  /* ▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼ */
  /*  여기 따옴표 안에 카카오 JavaScript 키를 붙여넣으세요  */
  var KAKAO_JS_KEY = "2b8d861c9e62ef2a9ec2781114130ce9";
  /* ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲ */
</script>
<script>
function showErr(t){ var b=document.getElementById('errbar'); if(b){ b.style.display='block'; b.textContent='⚠ '+t; } }
window.onerror=function(msg,src,line){ showErr('오류: '+msg+(line?(' (줄 '+line+')'):'')); return false; };

(function loadSDK(){
  if(!KAKAO_JS_KEY || KAKAO_JS_KEY.indexOf("붙여넣기")>=0){
    showErr('카카오 JavaScript 키를 아직 안 넣었어요. 파일 맨 위 KAKAO_JS_KEY = "..." 안에 키를 붙여넣어 주세요.');
    return;
  }
  var s=document.createElement('script');
  s.src="//dapi.kakao.com/v2/maps/sdk.js?appkey="+KAKAO_JS_KEY+"&libraries=services&autoload=false";
  s.onload=function(){ try{ kakao.maps.load(initApp); }catch(e){ showErr('SDK 로드 오류: '+e.message); } };
  s.onerror=function(){ showErr('카카오 SDK를 불러오지 못했어요. 키 값과 도메인 등록을 확인해 주세요.'); };
  document.head.appendChild(s);
})();

function initApp(){ try{
  "use strict";
  var Status=kakao.maps.services.Status;
  var SortBy=kakao.maps.services.SortBy;

  var favs={}, orders={}, manual={};
  var current="", radius=10, currentSet=null, centerLL=null, mapObj=null, mapMarkers=[], mapOn=false;
  var results=document.getElementById("results");

  function esc(s){ return String(s==null?"":s).replace(/[<>&]/g,function(c){return c==='<'?'&lt;':c==='>'?'&gt;':'&amp;';}); }
  function getManual(r,t){ if(!manual[r]) manual[r]={}; if(!manual[r][t]) manual[r][t]=[]; return manual[r][t]; }
  function idOf(r,t,n){ return r+"|"+t+"|"+n; }
  function won(n){ return Number(n).toLocaleString("ko-KR"); }
  function km(d){ if(!d && d!==0) return "—"; return (d<10? d.toFixed(1): d.toFixed(0))+"km"; }

  function card(s,region,type){
    var id=idOf(region,type,s.name), isFav=!!favs[id], o=orders[id];
    var distHtml = s.manual ? '<span class="dist manual">직접 추가</span>' : '<span class="dist">'+km(s.distKm)+'</span>';
    var last = o ? '<div class="lastorder">🧾 최근 주문 <b>'+o.date+'</b> · '+esc(o.qty||"-")+(o.memo?(" · "+esc(o.memo)):"")+(o.price?(" · "+won(o.price)+"원"):"")+'</div>' : '';
    var callBtn = s.tel ? '<a class="btn btn-call" href="tel:'+esc(s.tel)+'">📞 '+esc(s.tel)+'</a>' : '<span class="btn btn-nocall">번호 없음</span>';
    return ''
      +'<div class="card '+(isFav?"is-fav":"")+'" data-id="'+esc(id)+'">'
      +'<div class="card-top"><div><div class="name">'+esc(s.name)+'</div>'
      +'<div class="meta">'+distHtml+(s.cat?'<span class="cat">'+esc(s.cat)+'</span>':'')+'<span class="addr">'+esc(s.addr||"")+'</span></div></div>'
      +'<button class="star '+(isFav?"on":"")+'" data-act="fav">'+(isFav?"★":"☆")+'</button></div>'
      +last
      +'<div class="actions">'+callBtn
      +'<button class="btn btn-log" data-act="toggle">📝 주문 기록</button></div>'
      +'<div class="order">'
      +'<span class="lab">수량</span><input data-f="qty" placeholder="예: 칵테일얼음 10봉">'
      +'<span class="lab">단가(원)</span><input data-f="price" placeholder="3000" inputmode="numeric">'
      +'<span class="lab">메모</span><input data-f="memo" placeholder="새벽배송 가능">'
      +'<button class="savebtn" data-act="save">이 주문 저장</button></div>'
      +'</div>';
  }

  function addBox(region,type){
    var label = type==="ice" ? "얼음집" : type==="gas" ? "가스 업체" : "식자재마트";
    return '<div class="addbox" data-region="'+esc(region)+'" data-type="'+type+'">'
      +'<button class="addnew" data-act="addopen">➕ 지도에 없는 '+label+' 직접 추가</button>'
      +'<div class="addform">'
      +'<span class="lab">업체명</span><input data-af="name" placeholder="예: 동네 '+label+'">'
      +'<span class="lab">주소/동</span><input data-af="addr" placeholder="예: 기흥구 보정동">'
      +'<span class="lab">전화번호</span><input data-af="tel" placeholder="010-0000-0000" inputmode="tel">'
      +'<button class="savebtn" data-act="addsave">목록에 추가</button></div></div>';
  }

  function block(title,cls,arr,region,type){
    var man=getManual(region,type);
    var within=arr.filter(function(s){return s.distKm<=radius;}).sort(function(a,b){return a.distKm-b.distKm;});
    var beyond=arr.length-within.length;
    var h='<div class="section '+cls+'"><div class="sec-head"><span class="sec-bar"></span><span class="sec-title">'+title+'</span><span class="sec-count">'+(man.length+within.length)+'곳</span></div>';
    man.forEach(function(s){ h+=card(s,region,type); });
    within.forEach(function(s){ h+=card(s,region,type); });
    if(!man.length && !within.length) h+='<div class="beyond">반경 '+radius+'km 내에 없어요 — 위에서 반경을 넓혀보세요</div>';
    if(beyond>0 && radius!==999) h+='<div class="beyond">+ 반경 밖 '+beyond+'곳 더 있음</div>';
    h+=addBox(region,type);
    return h+'</div>';
  }

  function render(){
    var set=currentSet;
    if(!set){ results.innerHTML='<div class="empty"><div class="big">🔍</div>결과가 없어요. 읍·면·동을 더 정확히 넣어보세요.</div>'; document.getElementById("mapBtn").style.display="none"; document.getElementById("mapwrap").style.display="none"; mapOn=false; return; }
    var html="";
    var allIce=set.ice.concat(getManual(current,"ice"));
    var allGas=set.gas.concat(getManual(current,"gas"));
    var allMart=(set.mart||[]).concat(getManual(current,"mart"));
    var fIce=allIce.filter(function(s){return favs[idOf(current,"ice",s.name)];});
    var fGas=allGas.filter(function(s){return favs[idOf(current,"gas",s.name)];});
    var fMart=allMart.filter(function(s){return favs[idOf(current,"mart",s.name)];});
    if(fIce.length+fGas.length+fMart.length){
      html+='<div class="section fav"><div class="sec-head"><span class="sec-bar"></span><span class="sec-title">⭐ 자주 쓰는 곳</span><span class="sec-count">'+(fIce.length+fGas.length+fMart.length)+'</span></div>';
      fIce.forEach(function(s){ html+=card(s,current,"ice"); });
      fGas.forEach(function(s){ html+=card(s,current,"gas"); });
      fMart.forEach(function(s){ html+=card(s,current,"mart"); });
      html+='</div>';
    }
    html+='<div class="meta-line">📍 '+esc(set.center)+' 기준 · 반경 '+(radius===999?"전체":radius+"km")+'</div>';
    html+=block("🧊 식용·칵테일 얼음","ice",set.ice,current,"ice");
    html+=block("🔥 LPG 가스","gas",set.gas,current,"gas");
    html+=block("🛒 식자재마트","mart",set.mart||[],current,"mart");
    results.innerHTML=html;
    document.getElementById("mapBtn").style.display="block";
    if(mapOn) buildMap();
  }

  function showLoading(){ results.innerHTML='<div class="empty"><div class="big">⏳</div>'+esc(current)+' 주변 검색 중…</div>'; }

  function kwSearch(keyword, loc){
    return new Promise(function(resolve){
      var places=new kakao.maps.services.Places();
      places.keywordSearch(keyword, function(data, status){
        resolve(status===Status.OK ? data : []);
      }, { location: loc, radius: 20000, sort: SortBy.DISTANCE });
    });
  }

  function findRegions(query){
    return new Promise(function(resolve){
      var g=new kakao.maps.services.Geocoder();
      g.addressSearch(query, function(result, status){
        if(status===Status.OK && result && result.length){
          var seen={}, list=[];
          result.forEach(function(r){
            var nm=r.address_name;
            if(seen[nm]) return; seen[nm]=1;
            list.push({lat:parseFloat(r.y), lng:parseFloat(r.x), name:nm});
          });
          resolve(list.slice(0,6));
        } else {
          // 주소로 안 잡히면 장소 검색으로 대체 (단일 후보)
          var p=new kakao.maps.services.Places();
          p.keywordSearch(query, function(data, st){
            if(st===Status.OK && data && data.length){
              resolve([{lat:parseFloat(data[0].y), lng:parseFloat(data[0].x), name:data[0].place_name+" 주변"}]);
            } else resolve([]);
          });
        }
      });
    });
  }

  function isRelevant(p, type){
    var g=p.category_group_code||"";
    var leaf=catShort(p.category_name||""); // 가장 구체적인 업종만 본다
    if(g==="FD6"||g==="CE7") return false;  // 음식점/카페 (확실)
    if(type==="ice"){
      if(g==="MT1"||g==="CS2") return false; // 대형마트/편의점
      if(/아이스크림|빙수|슈퍼|마트|편의점|할인점|식료품|정육|과자|음식|식당|주점/.test(leaf)) return false;
      return true;
    }
    if(type==="gas"){
      if(/충전소/.test(p.place_name||"")) return false; // 상호에 '충전소' = 차량 주유소
      if(/주유소|도시가스|냉난방|냉방|난방|에어컨|보일러|설비|시공|공조|인테리어|렌탈|렌털|자동차|가스레인지|주방/.test(leaf)) return false;
      return true;
    }
    if(type==="mart"){
      if(g==="CS2") return false;
      if(/편의점/.test(leaf)) return false;
      return true;
    }
    return true;
  }
  function catShort(cn){
    if(!cn) return "";
    var parts=cn.split(">");
    return parts[parts.length-1].trim();
  }
  function dedupe(arrays, type){
    var seen={}, out=[];
    arrays.forEach(function(list){
      list.forEach(function(p){
        if(seen[p.id]) return; seen[p.id]=1;
        if(!isRelevant(p, type)) return;
        out.push({
          name:p.place_name,
          addr:p.road_address_name||p.address_name||"",
          tel:p.phone||"",
          cat:catShort(p.category_name),
          lat:parseFloat(p.y), lng:parseFloat(p.x),
          distKm: p.distance ? (parseInt(p.distance,10)/1000) : 0
        });
      });
    });
    out.sort(function(a,b){return a.distKm-b.distKm;});
    return out.slice(0,25);
  }

  function runSearchAt(center){
    current=center.name; currentSet=null; showLoading();
    var loc=new kakao.maps.LatLng(center.lat, center.lng);
    centerLL=loc;
    var iceKw=["얼음","제빙","식용얼음","얼음도매","제빙공장","칵테일얼음"];
    var gasKw=["가스","LPG","프로판가스","LPG판매","가스배달"];
    var martKw=["식자재마트","식자재","도매마트","식품도매"];
    Promise.all([
      Promise.all(iceKw.map(function(k){return kwSearch(k,loc);})),
      Promise.all(gasKw.map(function(k){return kwSearch(k,loc);})),
      Promise.all(martKw.map(function(k){return kwSearch(k,loc);}))
    ]).then(function(res){
      currentSet={ center:center.name, ice:dedupe(res[0],"ice"), gas:dedupe(res[1],"gas"), mart:dedupe(res[2],"mart") };
      render();
    }).catch(function(e){ showErr('검색 오류: '+(e&&e.message?e.message:e)); });
  }

  function renderChooser(cands){
    var h='<div class="chooser"><div class="chooser-t">같은 이름이 여러 곳이에요. 어디인가요?</div>';
    cands.forEach(function(c){
      h+='<button class="choice" data-act="pickregion" data-lat="'+c.lat+'" data-lng="'+c.lng+'" data-name="'+esc(c.name)+'">📍 '+esc(c.name)+'</button>';
    });
    h+='</div>';
    results.innerHTML=h;
  }

  function doSearch(r){
    var q=(r||"").trim();
    if(!q) return;
    current=q; currentSet=null; showLoading();
    findRegions(q).then(function(cands){
      if(!cands.length){ results.innerHTML='<div class="empty"><div class="big">🔍</div>"'+esc(q)+'" 위치를 찾지 못했어요.<br>읍·면·동을 더 정확히 입력해보세요.</div>'; return; }
      if(cands.length===1){ runSearchAt(cands[0]); }
      else { renderChooser(cands); }
    }).catch(function(e){ showErr('검색 오류: '+(e&&e.message?e.message:e)); });
  }

  function searchHere(){
    if(!navigator.geolocation){ showErr('이 브라우저는 위치 기능을 지원하지 않아요.'); return; }
    current="현재 위치"; currentSet=null;
    results.innerHTML='<div class="empty"><div class="big">📍</div>현재 위치 확인 중…</div>';
    navigator.geolocation.getCurrentPosition(function(pos){
      runSearchAt({lat:pos.coords.latitude, lng:pos.coords.longitude, name:"현재 위치"});
    }, function(){
      showErr('위치를 가져오지 못했어요. 브라우저 위치 권한을 허용해 주세요.');
      results.innerHTML='<div class="empty"><div class="big">📍</div>위치 권한을 허용하면<br>현재 위치 주변을 찾아드려요.</div>';
    }, {enableHighAccuracy:true, timeout:10000, maximumAge:0});
  }

  function buildMap(){
    try{
      if(!currentSet || !centerLL) return;
      var cont=document.getElementById("map");
      if(!mapObj){ mapObj=new kakao.maps.Map(cont, {center:centerLL, level:6}); }
      mapMarkers.forEach(function(m){ m.setMap(null); }); mapMarkers=[];
      var bounds=new kakao.maps.LatLngBounds();
      bounds.extend(centerLL);
      var cEl=document.createElement('div'); cEl.className='pin pin-center';
      var cOv=new kakao.maps.CustomOverlay({position:centerLL, content:cEl, yAnchor:0.5, xAnchor:0.5, zIndex:5});
      cOv.setMap(mapObj); mapMarkers.push(cOv);
      function pins(list, cls){
        list.forEach(function(s){
          if(!s.lat || !s.lng) return;
          var pos=new kakao.maps.LatLng(s.lat, s.lng);
          var el=document.createElement('div'); el.className='pin '+cls; el.title=s.name;
          el.addEventListener('click', function(){
            if(window.__iw){ window.__iw.close(); }
            window.__iw=new kakao.maps.InfoWindow({position:pos, content:'<div style="padding:6px 9px;font-size:12px;font-weight:700;white-space:nowrap">'+esc(s.name)+' · '+km(s.distKm)+'</div>'});
            window.__iw.open(mapObj);
          });
          var ov=new kakao.maps.CustomOverlay({position:pos, content:el, yAnchor:0.5, xAnchor:0.5});
          ov.setMap(mapObj); mapMarkers.push(ov); bounds.extend(pos);
        });
      }
      pins(currentSet.ice,'pin-ice'); pins(currentSet.gas,'pin-gas'); pins(currentSet.mart||[],'pin-mart');
      setTimeout(function(){ try{ mapObj.relayout(); if(mapMarkers.length>1) mapObj.setBounds(bounds); }catch(_){}}, 60);
    }catch(e){ showErr('지도 오류: '+e.message); }
  }

  function toggleMap(){
    mapOn=!mapOn;
    document.getElementById("mapwrap").style.display = mapOn?"block":"none";
    document.getElementById("mapBtn").textContent = mapOn?"📋 목록만 보기":"🗺 지도로 보기";
    if(mapOn) buildMap();
  }

  results.addEventListener("click",function(e){
    var actEl=e.target.closest("[data-act]"); if(!actEl) return;
    var act=actEl.dataset.act;
    var c=e.target.closest(".card");
    if(act==="fav"){
      var id=c.dataset.id;
      if(favs[id]){ delete favs[id]; } else { favs[id]=true; }
      render();
    } else if(act==="toggle"){
      c.querySelector(".order").classList.toggle("open");
    } else if(act==="save"){
      var cid=c.dataset.id;
      var qty=c.querySelector('[data-f="qty"]').value.trim();
      var price=c.querySelector('[data-f="price"]').value.replace(/[^0-9]/g,"");
      var memo=c.querySelector('[data-f="memo"]').value.trim();
      var d=new Date(); orders[cid]={date:(d.getMonth()+1)+"/"+d.getDate(),qty:qty,price:price,memo:memo};
      render();
    } else if(act==="addopen"){
      actEl.nextElementSibling.classList.toggle("open");
    } else if(act==="addsave"){
      var box=actEl.closest(".addbox");
      var region=box.dataset.region, type=box.dataset.type;
      var name=box.querySelector('[data-af="name"]').value.trim();
      var addr=box.querySelector('[data-af="addr"]').value.trim();
      var tel=box.querySelector('[data-af="tel"]').value.trim();
      if(!name){ box.querySelector('[data-af="name"]').focus(); return; }
      getManual(region,type).push({name:name,addr:addr,tel:tel,manual:true});
      render();
    } else if(act==="pickregion"){
      runSearchAt({lat:parseFloat(actEl.dataset.lat), lng:parseFloat(actEl.dataset.lng), name:actEl.dataset.name});
    }
  });

  document.getElementById("searchBtn").addEventListener("click",function(){ doSearch(document.getElementById("region").value); });
  document.getElementById("region").addEventListener("keydown",function(e){ if(e.key==="Enter") doSearch(e.target.value); });
  var hintEls=document.querySelectorAll(".hint b");
  for(var i=0;i<hintEls.length;i++){
    (function(b){ b.addEventListener("click",function(){ document.getElementById("region").value=b.dataset.r; doSearch(b.dataset.r); }); })(hintEls[i]);
  }
  document.getElementById("radius").addEventListener("click",function(e){
    var chip=e.target.closest(".chip"); if(!chip) return;
    var chips=document.querySelectorAll(".chip");
    for(var j=0;j<chips.length;j++){ chips[j].classList.remove("on"); }
    chip.classList.add("on"); radius=Number(chip.dataset.km); render();
  });

  document.getElementById("hereBtn").addEventListener("click", searchHere);
  document.getElementById("mapBtn").addEventListener("click", toggleMap);
  results.innerHTML='<div class="empty"><div class="big">📍</div>행사장 <b style="color:#3A414B;font-weight:800">읍·면·동</b>을 입력하면<br>그 주변 얼음·가스 업체를 찾아드려요.<br><span style="font-size:12px">예: 구갈동, 정자동, 서교동</span></div>';

}catch(err){ showErr('초기화 오류: '+err.message); } }
</script>
</body>
</html>
